server {
    listen 80;
    server_name _;

    # Health check → backend
    location = /health {
        proxy_pass http://backend:8000;
    }

    # Uploaded avatar images → backend
    location /uploads/avatars/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # API → FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # LiveKit WebSocket (agent connections, SDK)
    location /rtc {
        resolver 127.0.0.11 valid=10s;
        set $livekit_upstream http://host.docker.internal:7880;
        proxy_pass $livekit_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Admin frontend
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Kiosk frontend — served at /kiosk/{slug}
    location /kiosk/ {
        alias /usr/share/nginx/html/kiosk/;
        try_files $uri $uri/ /kiosk/index.html;
    }

    # Default → admin
    location / {
        root /usr/share/nginx/html/admin;
        try_files $uri $uri/ /index.html;
    }
}

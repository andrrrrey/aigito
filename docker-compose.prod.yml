# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Differences from dev:
#   - backend: multiple workers, no --reload
#   - agent: restart always
#   - livekit: use_external_ip: true (set in livekit.prod.yaml)
#   - nginx: mount production SSL config

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=production
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    extra_hosts:
      - "livekit:host-gateway"
    volumes:
      - avatar_uploads:/app/uploads/avatars

  agent:
    restart: always
    network_mode: host
    environment:
      - LIVEKIT_URL=ws://localhost:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - LEMONSLICE_API_KEY=${LEMONSLICE_API_KEY}
      - QDRANT_HOST=localhost
      - QDRANT_PORT=6333
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/aigita

  postgres:
    restart: always

  qdrant:
    restart: always

  redis:
    restart: always

  livekit:
    restart: always
    network_mode: host
    volumes:
      - ./livekit.prod.yaml:/etc/livekit.yaml

  nginx:
    extra_hosts:
      - "livekit:host-gateway"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./frontend-kiosk:/usr/share/nginx/html/kiosk
      - ./frontend-admin:/usr/share/nginx/html/admin
    ports:
      - "80:80"
      - "443:443"

volumes:
  avatar_uploads:

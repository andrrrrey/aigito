# Production LiveKit config
# Replace keys and domain before use
port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50010
  use_external_ip: true
keys:
  # REPLACE with long random strings generated by: openssl rand -hex 32
  aigita_prod_key: REPLACE_WITH_LONG_RANDOM_SECRET
logging:
  level: warn
turn:
  enabled: false  # Enable for strict NAT environments (requires stun/turn server)

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGITO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Idle screen -->
        <div id="screen-idle" class="screen active">
            <div id="avatar-idle-container">
                <img id="avatar-idle-img" src="" alt="Avatar" style="display:none">
            </div>
            <div class="idle-prompt">
                <h2>Здравствуйте! Я могу вам помочь.</h2>
                <p>Нажмите кнопку и задайте вопрос</p>
            </div>
            <button id="btn-start" class="btn-mic btn-mic-large" aria-label="Начать разговор">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
                    <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 14 0h-2zm-5 9v-2a7 7 0 0 0 7-7h-2a5 5 0 0 1-10 0H5a7 7 0 0 0 7 7v2z"/>
                </svg>
            </button>
        </div>

        <!-- Dialog screen -->
        <div id="screen-dialog" class="screen">
            <div id="avatar-video-container">
                <video id="avatar-video" autoplay playsinline muted></video>
                <div id="status-indicator" class="status-connecting"></div>
                <button id="btn-fullscreen" class="btn-fullscreen" aria-label="На весь экран">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
                <div id="demo-timer" style="display:none"></div>
                <div id="video-watermark">Сделано в AIGITO</div>
            </div>

            <!-- User speech transcription -->
            <div id="user-speech-box"></div>

            <!-- Subtitles -->
            <div id="subtitles"></div>

            <!-- Mic controls -->
            <div id="mic-controls">
                <div id="waveform-left" class="waveform"></div>
                <button id="btn-mic" class="btn-mic btn-mic-small" aria-label="Микрофон">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
                        <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 14 0h-2zm-5 9v-2a7 7 0 0 0 7-7h-2a5 5 0 0 1-10 0H5a7 7 0 0 0 7 7v2z"/>
                    </svg>
                </button>
                <div id="waveform-right" class="waveform"></div>
            </div>

            <button id="btn-end" class="btn-end">Завершить</button>
        </div>

        <!-- Demo limit screen -->
        <div id="screen-demo-limit" class="screen">
            <div class="demo-limit-content">
                <div class="demo-limit-icon">⏱</div>
                <h2>Вы исчерпали демо лимит</h2>
                <p>Демо сессия ограничена 1 минутой</p>
            </div>
        </div>
    </div>

    <script src="livekit-client.umd.min.js"></script>
    <script src="ui.js"></script>
    <script src="livekit-client.js"></script>
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGITO Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <h1>AIGITO</h1>
            <p>Личный кабинет</p>
        </div>

        <div id="login-form" class="auth-form">
            <h2>Вход</h2>
            <div id="login-error" class="error-msg" style="display:none"></div>
            <input type="email" id="login-email" placeholder="Email" autocomplete="email">
            <input type="password" id="login-password" placeholder="Пароль" autocomplete="current-password">
            <button id="btn-login" class="btn-primary">Войти</button>
            <p class="auth-switch">Нет аккаунта? <a href="#" id="show-register">Зарегистрироваться</a></p>
        </div>

        <div id="register-form" class="auth-form" style="display:none">
            <h2>Регистрация</h2>
            <div id="register-error" class="error-msg" style="display:none"></div>
            <input type="text" id="reg-name" placeholder="Ваше имя">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Пароль">
            <button id="btn-register" class="btn-primary">Создать аккаунт</button>
            <p class="auth-switch">Уже есть аккаунт? <a href="#" id="show-login">Войти</a></p>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>

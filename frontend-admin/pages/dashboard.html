<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд — AIGITO Admin</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">AIGITO</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="active">📊 Дашборд</a>
            <a href="knowledge.html">📚 База знаний</a>
            <a href="avatar.html">🤖 Аватар</a>
            <a href="settings.html">⚙️ Настройки</a>
        </nav>
        <div class="sidebar-bottom">
            <a href="#" id="btn-logout" style="color:var(--sidebar-text);text-decoration:none;font-size:0.9rem;">← Выйти</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Дашборд</h1>
            <p>Статистика и аналитика вашего аватара</p>
        </div>

        <div class="cards-grid">
            <div class="card">
                <div class="card-label">Диалогов сегодня</div>
                <div class="card-value" id="stat-today">—</div>
            </div>
            <div class="card">
                <div class="card-label">Всего диалогов</div>
                <div class="card-value" id="stat-total">—</div>
            </div>
            <div class="card">
                <div class="card-label">Ср. длительность</div>
                <div class="card-value" id="stat-avg">—</div>
                <div class="card-sub">секунд</div>
            </div>
            <div class="card">
                <div class="card-label">Минут использовано</div>
                <div class="card-value" id="stat-minutes">—</div>
                <div class="card-sub" id="stat-minutes-limit"></div>
                <div class="progress-bar"><div class="progress-fill" id="minutes-progress" style="width:0%"></div></div>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
            <div class="section">
                <div class="section-title">Топ тем вопросов</div>
                <div id="topics-list"><p style="color:var(--text-muted)">Нет данных</p></div>
            </div>
            <div class="section">
                <div class="section-title">Последние диалоги</div>
                <div id="dialogs-list"><p style="color:var(--text-muted)">Нет данных</p></div>
            </div>
        </div>
    </main>
</div>

<script src="../api.js"></script>
<script>
document.getElementById('btn-logout').addEventListener('click', (e) => {
    e.preventDefault();
    API.clearToken();
    window.location.href = '/admin/index.html';
});

async function loadDashboard() {
    if (!API.getToken()) { window.location.href = '/admin/index.html'; return; }
    try {
        const [summary, topics, dialogs] = await Promise.all([
            API.getSummary(),
            API.getTopics(),
            API.getDialogs(5),
        ]);

        document.getElementById('stat-today').textContent = summary.dialogs_today;
        document.getElementById('stat-total').textContent = summary.dialogs_total;
        document.getElementById('stat-avg').textContent = summary.avg_duration_seconds
            ? Math.round(summary.avg_duration_seconds) : '—';
        document.getElementById('stat-minutes').textContent = Math.round(summary.minutes_used);
        document.getElementById('stat-minutes-limit').textContent = `из ${summary.minutes_limit} мин`;
        const pct = Math.min(100, (summary.minutes_used / summary.minutes_limit) * 100);
        document.getElementById('minutes-progress').style.width = `${pct}%`;

        // Topics
        const topicsEl = document.getElementById('topics-list');
        if (topics.length) {
            topicsEl.innerHTML = topics.map(t =>
                `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
                    <span>${t.topic}</span><strong>${t.count}</strong>
                </div>`
            ).join('');
        }

        // Dialogs
        const dialogsEl = document.getElementById('dialogs-list');
        if (dialogs.length) {
            dialogsEl.innerHTML = dialogs.map(d => {
                const date = new Date(d.started_at).toLocaleString('ru');
                const dur = d.duration_seconds ? `${Math.round(d.duration_seconds)}с` : '—';
                return `<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:0.9rem">
                    <div>${date}</div>
                    <div style="color:var(--text-muted)">${dur} · ${d.language}</div>
                </div>`;
            }).join('');
        }
    } catch (e) {
        console.error(e);
    }
}

loadDashboard();
</script>
</body>
</html>

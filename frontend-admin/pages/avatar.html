<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки аватара — AIGITO Admin</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">AIGITO</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">📊 Дашборд</a>
            <a href="knowledge.html">📚 База знаний</a>
            <a href="avatar.html" class="active">🤖 Аватар</a>
            <a href="api-keys.html">🔑 API ключи</a>
            <a href="settings.html">⚙️ Настройки</a>
        </nav>
        <div class="sidebar-bottom">
            <a href="#" id="btn-logout" style="color:var(--sidebar-text);text-decoration:none;font-size:0.9rem;">← Выйти</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Настройки аватара</h1>
            <p>Внешность, голос и правила поведения</p>
        </div>

        <div class="section">
            <div class="section-title">Изображение аватара</div>
            <div id="avatar-preview" style="margin-bottom:16px;text-align:center"></div>
            <div class="form-group">
                <label>Загрузить с компьютера</label>
                <div id="avatar-drop-zone" class="drop-zone" style="padding:24px;margin-bottom:12px">
                    <p>Перетащите изображение сюда или нажмите для выбора</p>
                    <p style="font-size:0.8rem;margin-top:4px">JPEG, PNG, WebP, GIF — до 5 МБ</p>
                    <input type="file" id="avatar-file-input" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none">
                </div>
                <div id="upload-status"></div>
            </div>
            <div class="form-group">
                <label>Или укажите URL изображения</label>
                <input type="url" id="avatar-image-url" placeholder="https://example.com/avatar.jpg">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Голос аватара</div>
            <div class="form-group">
                <label>Провайдер озвучки</label>
                <select id="tts-provider" style="max-width:300px">
                    <option value="openai">OpenAI TTS</option>
                    <option value="elevenlabs">ElevenLabs</option>
                </select>
            </div>
            <div class="form-group" id="openai-voice-group">
                <label>Голос OpenAI</label>
                <select id="openai-voice" style="max-width:300px">
                    <option value="nova">Nova (по умолчанию)</option>
                    <option value="alloy">Alloy</option>
                    <option value="echo">Echo</option>
                    <option value="fable">Fable</option>
                    <option value="onyx">Onyx</option>
                    <option value="shimmer">Shimmer</option>
                    <option value="ash">Ash</option>
                    <option value="sage">Sage</option>
                    <option value="coral">Coral</option>
                </select>
            </div>
            <div class="form-group" id="elevenlabs-voice-group" style="display:none">
                <label>ElevenLabs Voice ID</label>
                <input type="text" id="avatar-voice-id" placeholder="21m00Tcm4TlvDq8ikWAM">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Приветственная фраза</div>
            <div class="form-group">
                <label>Фраза, которой аватар будет приветствовать клиентов (на русском — автоматически переводится на выбранный язык)</label>
                <textarea id="avatar-greeting" placeholder="Здравствуйте! Я виртуальный ассистент. Чем могу помочь?"></textarea>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Правила поведения</div>
            <div class="form-group">
                <label>Дополнительные правила для аватара</label>
                <textarea id="custom-rules" placeholder="Например: Всегда предлагай записаться на консультацию. Не обсуждай конкурентов."></textarea>
            </div>
            <div class="form-group">
                <label>Запрещённые темы (через запятую)</label>
                <input type="text" id="blocked-topics" placeholder="политика, религия, конкуренты">
            </div>
            <div class="form-group" style="display:flex;align-items:center;gap:12px">
                <input type="checkbox" id="enable-web-search" style="width:auto">
                <label for="enable-web-search" style="margin:0">Разрешить веб-поиск</label>
            </div>
        </div>

        <div id="save-status"></div>
        <button class="btn-primary" id="btn-save" style="max-width:200px">Сохранить</button>
    </main>
</div>

<script src="../api.js"></script>
<script>
document.getElementById('btn-logout').addEventListener('click', (e) => {
    e.preventDefault(); API.clearToken(); window.location.href = '/admin/index.html';
});

if (!API.getToken()) window.location.href = '/admin/index.html';

const dropZone = document.getElementById('avatar-drop-zone');
const fileInput = document.getElementById('avatar-file-input');
const uploadStatus = document.getElementById('upload-status');
const urlInput = document.getElementById('avatar-image-url');

// TTS provider switching
const ttsProviderSelect = document.getElementById('tts-provider');
const openaiVoiceGroup = document.getElementById('openai-voice-group');
const elevenlabsVoiceGroup = document.getElementById('elevenlabs-voice-group');

function updateTtsFields() {
    if (ttsProviderSelect.value === 'elevenlabs') {
        openaiVoiceGroup.style.display = 'none';
        elevenlabsVoiceGroup.style.display = 'block';
    } else {
        openaiVoiceGroup.style.display = 'block';
        elevenlabsVoiceGroup.style.display = 'none';
    }
}
ttsProviderSelect.addEventListener('change', updateTtsFields);

function showPreview(src) {
    const preview = document.getElementById('avatar-preview');
    if (src) {
        preview.innerHTML = `<img src="${src}" alt="Avatar" style="max-width:200px;max-height:200px;border-radius:12px;border:1px solid var(--border)">`;
    } else {
        preview.innerHTML = '';
    }
}

async function handleFileUpload(file) {
    if (!file || !file.type.startsWith('image/')) return;
    uploadStatus.innerHTML = '<p style="color:var(--text-muted)">Загрузка...</p>';
    try {
        const result = await API.uploadAvatarImage(file);
        urlInput.value = result.avatar_image_url || '';
        showPreview(result.avatar_image_url);
        uploadStatus.innerHTML = '<p style="color:var(--success)">✓ Изображение загружено</p>';
    } catch (e) {
        uploadStatus.innerHTML = `<p style="color:var(--danger)">Ошибка: ${e.message}</p>`;
    }
}

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFileUpload(fileInput.files[0]);
});
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handleFileUpload(e.dataTransfer.files[0]);
});

const OPENAI_VOICES = new Set(['alloy', 'echo', 'fable', 'onyx', 'nova', 'shimmer', 'ash', 'sage', 'coral']);

async function loadCompany() {
    try {
        const c = await API.getCompany();
        urlInput.value = c.avatar_image_url || '';
        document.getElementById('avatar-greeting').value = c.avatar_greeting || '';
        document.getElementById('custom-rules').value = c.custom_rules || '';
        document.getElementById('blocked-topics').value = (c.blocked_topics || []).join(', ');
        document.getElementById('enable-web-search').checked = c.enable_web_search || false;
        showPreview(c.avatar_image_url);

        // TTS provider
        const provider = c.tts_provider || 'openai';
        ttsProviderSelect.value = provider;
        const voiceId = c.avatar_voice_id || '';

        if (provider === 'openai') {
            document.getElementById('openai-voice').value = OPENAI_VOICES.has(voiceId) ? voiceId : 'nova';
            document.getElementById('avatar-voice-id').value = '';
        } else {
            document.getElementById('avatar-voice-id').value = voiceId;
            document.getElementById('openai-voice').value = 'nova';
        }
        updateTtsFields();
    } catch (e) { console.warn(e); }
}

document.getElementById('btn-save').addEventListener('click', async () => {
    const statusEl = document.getElementById('save-status');
    try {
        const provider = ttsProviderSelect.value;
        let voiceId;
        if (provider === 'elevenlabs') {
            voiceId = document.getElementById('avatar-voice-id').value || null;
        } else {
            voiceId = document.getElementById('openai-voice').value || 'nova';
        }

        // Save tts_provider first so partial failure doesn't leave inconsistent state
        const blockedRaw = document.getElementById('blocked-topics').value;
        await API.updateCompany({
            custom_rules: document.getElementById('custom-rules').value,
            blocked_topics: blockedRaw ? blockedRaw.split(',').map(s => s.trim()) : [],
            enable_web_search: document.getElementById('enable-web-search').checked,
            tts_provider: provider,
        });
        await API.updateAvatar({
            avatar_image_url: urlInput.value || null,
            avatar_voice_id: voiceId,
            avatar_greeting: document.getElementById('avatar-greeting').value || null,
        });
        statusEl.innerHTML = '<p style="color:var(--success)">✓ Сохранено</p>';
    } catch (e) {
        statusEl.innerHTML = `<p style="color:var(--danger)">Ошибка: ${e.message}</p>`;
    }
});

loadCompany();
</script>
</body>
</html>
